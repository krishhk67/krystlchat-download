<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KRYSTLCHAT</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:24px;
background:
radial-gradient(circle at top,#24123f 0%,#09090f 45%,#050507 100%);
font-family:Inter,Arial,sans-serif;
color:white;
overflow-x:hidden;
position:relative;
}

/* background glow */
body::before{
content:"";
position:fixed;
width:500px;
height:500px;
background:rgba(168,85,247,.12);
filter:blur(120px);
top:-150px;
left:50%;
transform:translateX(-50%);
pointer-events:none;
}

.container{
width:min(92vw,420px);
text-align:center;
padding:34px 24px;
border-radius:28px;

background:rgba(255,255,255,.04);
border:1px solid rgba(255,255,255,.08);
backdrop-filter:blur(20px);

box-shadow:
0 0 40px rgba(168,85,247,.12),
0 0 120px rgba(168,85,247,.08);
}

/* Logo */
.logo{
width:100px;
height:100px;
border-radius:50%;
object-fit:cover;

border:2px solid rgba(168,85,247,.65);

box-shadow:
0 0 20px rgba(168,85,247,.25);

margin-bottom:20px;
}

/* Title */
h1{
font-size:2.4rem;
font-weight:900;
letter-spacing:2px;
margin-bottom:10px;
}

/* Subtitle */
.subtitle{
color:#bdbdcf;
line-height:1.6;
font-size:.95rem;
margin-bottom:28px;
}

/* Download button */
.download-btn{
display:inline-block;
width:100%;
max-width:280px;

padding:16px 20px;

border-radius:16px;

text-decoration:none;
font-weight:800;
font-size:1rem;
color:white;

background:
linear-gradient(
135deg,
#9333ea,
#c084fc
);

box-shadow:
0 10px 30px rgba(168,85,247,.35);

transition:.25s;
}

.download-btn:hover{
transform:translateY(-3px);
box-shadow:
0 15px 40px rgba(168,85,247,.5);
}

/* Version */
.version{
margin-top:16px;
font-size:.85rem;
color:#8f8fa5;
}

/* Features */
.features{
margin-top:28px;
text-align:left;
font-size:.95rem;
color:#e5e5f0;
}

.feature{
display:flex;
align-items:center;
gap:10px;
padding:8px 0;
}

/* Footer */
.footer{
margin-top:24px;
font-size:.8rem;
color:#77778a;
}

/* Mobile */
@media(max-width:480px){

.container{
padding:28px 18px;
border-radius:24px;
}

.logo{
width:90px;
height:90px;
}

h1{
font-size:2rem;
}

.subtitle{
font-size:.9rem;
}

.download-btn{
width:100%;
}

}
</style>
</head>

<body>

<div class="container">

<img src="favicon.png" class="logo" alt="KRYSTLCHAT Logo">

<h1>KRYSTLCHAT</h1>

<p class="subtitle">
Private. Temporary. Hidden.<br>
Anonymous conversations without accounts.
</p>

<a href="KrystlChat-v1.0.apk" class="download-btn">
⬇ Download APK
</a>

<div class="version">
Latest Version • Android
</div>

<div class="features">

<div class="feature">
🔒 Secret Rooms
</div>

<div class="feature">
⏳ Auto-Deleting Chats
</div>

<div class="feature">
🌙 Dark Mode
</div>

<div class="feature">
👻 Anonymous Messaging
</div>

</div>

<div class="footer">
No accounts • No tracking • No nonsense
</div>

</div>

</body>
</html>
