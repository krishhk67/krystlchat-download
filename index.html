<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>KRYSTLCHAT</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Inter,Arial,sans-serif;
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:20px;
overflow:hidden;
color:white;

background:
radial-gradient(circle at top,#31104f 0%,#0a0815 45%,#040406 100%);
}

/* Animated background glow */

body::before{
content:"";
position:fixed;
width:700px;
height:700px;
background:rgba(168,85,247,.18);
filter:blur(140px);
top:-250px;
left:50%;
transform:translateX(-50%);
animation:pulse 6s ease-in-out infinite;
pointer-events:none;
}

@keyframes pulse{
0%,100%{
opacity:.5;
transform:translateX(-50%) scale(1);
}
50%{
opacity:1;
transform:translateX(-50%) scale(1.15);
}
}

/* Floating particles */

.particle{
position:fixed;
border-radius:50%;
background:rgba(168,85,247,.2);
pointer-events:none;
animation:float linear infinite;
}

.p1{
width:8px;
height:8px;
left:10%;
top:100%;
animation-duration:12s;
}

.p2{
width:12px;
height:12px;
left:80%;
top:100%;
animation-duration:16s;
}

.p3{
width:6px;
height:6px;
left:60%;
top:100%;
animation-duration:10s;
}

@keyframes float{
from{
transform:translateY(0);
}
to{
transform:translateY(-120vh);
}
}

/* Card */

.container{
width:min(92vw,430px);

padding:38px 24px;

border-radius:28px;

background:rgba(255,255,255,.04);

border:1px solid rgba(255,255,255,.08);

backdrop-filter:blur(20px);

box-shadow:
0 0 50px rgba(168,85,247,.18),
0 0 120px rgba(168,85,247,.08);

text-align:center;

animation:cardIn 1s ease;
}

@keyframes cardIn{
from{
opacity:0;
transform:translateY(40px);
}
to{
opacity:1;
transform:translateY(0);
}
}

/* Logo */

.logo{
width:105px;
height:105px;
border-radius:50%;
object-fit:cover;

border:2px solid rgba(168,85,247,.65);

box-shadow:
0 0 25px rgba(168,85,247,.35);

animation:logoFloat 4s ease-in-out infinite;
}

@keyframes logoFloat{
0%,100%{
transform:translateY(0);
}
50%{
transform:translateY(-8px);
}
}

h1{
margin-top:18px;
font-size:2.5rem;
font-weight:900;
letter-spacing:2px;
}

.subtitle{
margin-top:12px;
color:#c3c3d3;
line-height:1.7;
font-size:.95rem;
}

/* Download button */

.download-btn{
position:relative;

display:inline-block;

margin-top:30px;

width:100%;
max-width:280px;

padding:16px;

border-radius:16px;

font-weight:800;
font-size:1rem;

color:white;
text-decoration:none;

overflow:hidden;

background:
linear-gradient(
135deg,
#9333ea,
#c084fc
);

box-shadow:
0 10px 35px rgba(168,85,247,.4);

transition:.3s;
}

.download-btn:hover{
transform:translateY(-4px);
}

.download-btn:active{
transform:scale(.97);
}

/* Shine animation */

.download-btn::before{
content:"";
position:absolute;
top:0;
left:-120%;
width:60%;
height:100%;

background:
linear-gradient(
90deg,
transparent,
rgba(255,255,255,.4),
transparent
);

transform:skewX(-25deg);

animation:shine 3s infinite;
}

@keyframes shine{
100%{
left:160%;
}
}

.version{
margin-top:16px;
font-size:.85rem;
color:#9797a8;
}

.features{
margin-top:28px;
text-align:left;
}

.feature{
padding:8px 0;
font-size:.95rem;
color:#ececf6;
}

/* Footer */

.footer{
margin-top:24px;
font-size:.82rem;
color:#7f7f91;
line-height:1.6;
}

/* Mobile */

@media(max-width:480px){

.container{
padding:30px 18px;
}

.logo{
width:90px;
height:90px;
}

h1{
font-size:2rem;
}

}

</style>
</head>

<body>

<div class="particle p1"></div>
<div class="particle p2"></div>
<div class="particle p3"></div>

<div class="container">

<img src="favicon.png" class="logo" alt="Logo">

<h1>KRYSTLCHAT</h1>

<p class="subtitle">
Private. Temporary. Hidden.<br>
Anonymous conversations without accounts.
</p>

<a href="KrystlChat-v1.0.apk" class="download-btn">
⬇ Download APK
</a>

<div class="version">
Latest Version v1.0 • Android
</div>

<div class="features">
<div class="feature">🔒 Secret Rooms</div>
<div class="feature">⏳ Auto-Deleting Chats</div>
<div class="feature">🌙 Dark Mode</div>
<div class="feature">👻 Anonymous Messaging</div>
</div>

<div class="footer">
No accounts • No tracking • No nonsense
</div>

</div>

</body>
</html>
